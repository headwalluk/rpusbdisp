name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kernel headers and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-headers-$(uname -r) build-essential

      - name: Build kernel module
        run: cd drivers/linux-driver && make modules

      - name: Verify module was produced
        run: test -f drivers/linux-driver/rp_usbdisplay.ko
